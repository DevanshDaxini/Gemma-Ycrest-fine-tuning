# Ruff config for gemma-finetune-practice
# Run: ruff check .
# Fix:  ruff check --fix .
# Format: ruff format .

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports)
    "I",   # isort (import ordering)
    "N",   # pep8 naming
    "UP",  # pyupgrade (modern Python syntax)
    "B",   # flake8-bugbear (likely bugs)
    "C4",  # flake8-comprehensions (cleaner list/dict comprehensions)
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — ML scripts have long strings, not worth enforcing
    "N803",  # argument name should be lowercase — ML code uses X, N, etc.
    "N806",  # variable in function should be lowercase — same reason
    "B008",  # do not perform function calls in argument defaults
    "E402",  # module import not at top — all scripts do sys.path.insert before local imports (intentional)
    "RUF002", # en dash in docstrings — cosmetic, not a bug
    "B905",  # zip() without strict= — data gen zips matched-length lists by construction
]

# Don't flag generated data files or adapter checkpoints
exclude = [
    "phase1_toy/data/",
    "phase2_ndjson/data/",
    "phase1_toy/adapters/",
    "phase2_ndjson/adapters/",
    "__pycache__",
]

[lint.per-file-ignores]
# generate_data.py builds large data structures inline — relax complexity rules
"*/generate_data.py" = ["C4", "SIM"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
