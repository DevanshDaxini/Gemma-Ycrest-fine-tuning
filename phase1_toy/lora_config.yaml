# Phase 1 LoRA config for mlx_lm.lora
# Run: python -m mlx_lm.lora --config lora_config.yaml
# Swap model to "google/gemma-3-1b-it" if mlx-community version not found

model: "mlx-community/gemma-3-1b-it-4bit"
train: true
data: "./data"
seed: 42
lora_layers: 16          # apply LoRA to top-16 transformer blocks

# LoRA hyperparameters
lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj", "self_attn.k_proj", "self_attn.o_proj", "mlp.gate_proj", "mlp.up_proj", "mlp.down_proj"]
  rank: 16
  alpha: 32.0
  dropout: 0.05
  scale: 10.0

# Training
batch_size: 4
iters: 2500               # ≈4 epochs over 585 train examples
learning_rate: 1.0e-4
val_batches: 4
steps_per_report: 10
steps_per_eval: 25
save_every: 100
adapter_path: "./adapters"
max_seq_length: 256
