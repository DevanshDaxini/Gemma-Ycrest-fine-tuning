# Phase 2 LoRA config for mlx_lm.lora
# Run: python -m mlx_lm.lora --config lora_config.yaml

model: "mlx-community/gemma-3-1b-it-4bit"
train: true
data: "./data"
seed: 42
lora_layers: 16

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj", "self_attn.k_proj", "self_attn.o_proj", "mlp.gate_proj", "mlp.up_proj", "mlp.down_proj"]
  rank: 8
  alpha: 16.0
  dropout: 0.05
  scale: 10.0

batch_size: 4
iters: 120               # ≈3 epochs over 150 train examples
learning_rate: 1.0e-4
val_batches: 4
steps_per_report: 10
steps_per_eval: 20
save_every: 60
adapter_path: "./adapters"
max_seq_length: 512      # workout logs + NDJSON output can be ~400 tokens
